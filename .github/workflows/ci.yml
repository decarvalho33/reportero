name: CI

on:
  push:
    branches: [main, "feature/**", "improvement/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Instalar dependências
        working-directory: app
        run: flutter pub get

      - name: Compilar aplicação (web)
        working-directory: app
        run: flutter build web --release

  test:
    name: Testes Automatizados
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Instalar dependências
        working-directory: app
        run: flutter pub get

      - name: Instalar Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase

      - name: Iniciar Supabase local (Docker)
        run: supabase start

      - name: Diagnostico - status e conectividade
        run: |
          supabase status
          curl -s http://localhost:54321/rest/v1/denuncias \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7urOL79dnpaqQ9eTuM59cLEH4m9IuJLBLc" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7urOL79dnpaqQ9eTuM59cLEH4m9IuJLBLc"

      - name: Executar testes unitários e de widget
        working-directory: app
        run: flutter test test/models test/viewmodels test/widget_test.dart

      - name: Executar testes de integração
        working-directory: app
        run: flutter test test/integration

      - name: Parar Supabase local
        if: always()
        run: supabase stop
